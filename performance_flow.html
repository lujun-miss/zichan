<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考核任务</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="p-6">
        <div class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">考核任务</h2>
            <p class="text-gray-600">资产管理绩效考核任务管理</p>
        </div>

        <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
            <div class="flex justify-between items-center mb-6">
                <div class="flex space-x-4">
                    <button onclick="window.location.href='create_performance.html'" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                        <i class="fa fa-plus mr-2"></i> 创建考核周期
                    </button>
                </div>
                <div class="relative">
                    <input type="text" class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="搜索考核...">
                    <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
            </div>

            <div class="mb-6">
                <div class="flex space-x-2 mb-4">
                    <button class="px-4 py-2 bg-blue-600 text-white rounded-lg">全部周期</button>
                    <button class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">进行中</button>
                    <button class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">未开始</button>
                    <button class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">已完成</button>
                    <button class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">已取消</button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">考核周期</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">开始日期</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">结束日期</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">考核对象</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">考核指标</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">当前阶段</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">进度</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">2026年第一季度考核</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">2026-01-01</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">2026-03-31</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">资产管理部全体员工</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">12项</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">自评阶段</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">进行中</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-blue-600 h-2 rounded-full" style="width: 35%"></div>
                                </div>
                                <span class="text-xs text-gray-500">35%</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <button onclick="viewPerformance('2026Q1')" class="text-blue-600 hover:text-blue-800 mr-3">详情</button>
                                <button onclick="remindPerformance('2026Q1')" class="text-green-600 hover:text-green-800 mr-3">催办</button>
                                <button onclick="cancelPerformance('2026Q1')" class="text-red-600 hover:text-red-800">取消</button>
                            </td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">2025年年度考核</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">2025-12-01</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">2026-01-15</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">资产管理部经理</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">15项</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">结果公示</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">已完成</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-green-600 h-2 rounded-full" style="width: 100%"></div>
                                </div>
                                <span class="text-xs text-gray-500">100%</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <button onclick="viewPerformance('2025Annual')" class="text-blue-600 hover:text-blue-800 mr-3">查看</button>
                                <button onclick="archivePerformance('2025Annual')" class="text-purple-600 hover:text-purple-800">归档</button>
                            </td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">2026年第二季度考核</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">2026-04-01</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">2026-06-30</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">资产管理部全体员工</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">12项</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">准备阶段</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">未开始</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-gray-400 h-2 rounded-full" style="width: 0%"></div>
                                </div>
                                <span class="text-xs text-gray-500">0%</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <button onclick="editPerformance('2026Q2')" class="text-blue-600 hover:text-blue-800 mr-3">编辑</button>
                                <button onclick="deletePerformance('2026Q2')" class="text-red-600 hover:text-red-800">删除</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-6 flex justify-between items-center">
                <div class="text-sm text-gray-500">
                    显示 1-3 条，共 3 条
                </div>
                <div class="flex space-x-2">
                    <button class="px-3 py-1 border border-gray-300 rounded text-gray-500 hover:bg-gray-50" disabled>上一页</button>
                    <button class="px-3 py-1 bg-blue-600 text-white rounded">1</button>
                    <button class="px-3 py-1 border border-gray-300 rounded text-gray-500 hover:bg-gray-50" disabled>下一页</button>
                </div>
            </div>
        </div>


    </div>
    <script>
        function viewPerformance(id) {
            console.log('查看考核详情:', id);
            alert('查看考核详情功能开发中...');
        }
        
        function remindPerformance(id) {
            console.log('催办考核:', id);
            if (confirm('确定要发送催办通知吗？')) {
                alert('催办通知已发送！');
            }
        }
        
        function cancelPerformance(id) {
            console.log('取消考核:', id);
            if (confirm('确定要取消这个考核周期吗？取消后将无法恢复！')) {
                alert('考核已取消！');
                location.reload();
            }
        }
        
        function archivePerformance(id) {
            console.log('归档考核:', id);
            if (confirm('确定要归档这个考核周期吗？')) {
                alert('考核已归档！');
                location.reload();
            }
        }
        
        function editPerformance(id) {
            console.log('编辑考核:', id);
            window.location.href = 'create_performance.html';
        }
        
        function deletePerformance(id) {
            console.log('删除考核:', id);
            if (confirm('确定要删除这个考核周期吗？删除后无法恢复！')) {
                alert('考核已删除！');
                location.reload();
            }
        }
    </script>
</body>
</html>
