<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑KPI指标</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50">
    <div class="p-6">
        <div class="mb-6">
            <div class="flex items-center space-x-4">
                <button onclick="window.location.href='kpi_library.html'" class="px-4 py-2 bg-white border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">
                    <i class="fa fa-arrow-left mr-2"></i> 返回
                </button>
                <h2 class="text-2xl font-bold text-gray-800">编辑KPI指标</h2>
            </div>
            <p class="text-gray-600 mt-2">修改现有绩效考核指标</p>
        </div>

        <div class="bg-white rounded-lg shadow-sm p-6">
            <form id="editKpiForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <span class="text-red-500">*</span> 指标编码
                        </label>
                        <input type="text" id="kpiCode" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" value="KPI-ASSET-001" readonly>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <span class="text-red-500">*</span> 指标名称
                        </label>
                        <input type="text" id="kpiName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" value="资产利用率" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <span class="text-red-500">*</span> 指标类别
                        </label>
                        <select id="kpiCategory" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                            <option value="efficiency" selected>资产效率指标</option>
                            <option value="preservation">资产保值指标</option>
                            <option value="compliance">流程合规指标</option>
                            <option value="management">管理效率指标</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <span class="text-red-500">*</span> 指标类型
                        </label>
                        <select id="kpiType" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" required>
                            <option value="ratio" selected>比率型</option>
                            <option value="absolute">绝对型</option>
                            <option value="target">目标型</option>
                            <option value="qualitative">定性型</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <span class="text-red-500">*</span> 计算方式
                        </label>
                        <textarea id="kpiFormula" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" rows="2" required>在用资产数量/总资产数量</textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            <span class="text-red-500">*</span> 权重
                        </label>
                        <div class="flex items-center space-x-2">
                            <input type="number" id="kpiWeight" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" value="15" step="0.1" min="0" max="100" required>
                            <span>%</span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">数据来源</label>
                        <select id="dataSource" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="system" selected>系统自动计算</option>
                            <option value="manual">手动录入</option>
                            <option value="import">数据导入</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">统计周期</label>
                        <select id="statCycle" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="month">月度</option>
                            <option value="quarter" selected>季度</option>
                            <option value="year">年度</option>
                            <option value="project">项目周期</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">目标值</label>
                        <input type="text" id="targetValue" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" value=">=95%">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                        <select id="kpiStatus" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="active" selected>启用</option>
                            <option value="inactive">禁用</option>
                        </select>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">指标描述</label>
                    <textarea id="kpiDescription" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" rows="4">衡量资产利用效率的核心指标，反映公司资产的使用程度和效益。计算公式为在用资产数量除以总资产数量，是评估资产管理水平的重要指标。</textarea>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">评分标准</label>
                    <div class="space-y-3">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">优秀 (&gt;=90分)</label>
                                <input type="text" id="excellent" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" value=">=95%">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">良好 (80-89分)</label>
                                <input type="text" id="good" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" value="85%-94%">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">合格 (70-79分)</label>
                                <input type="text" id="qualified" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" value="75%-84%">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">不合格 (&lt;70分)</label>
                                <input type="text" id="unqualified" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" value="&lt;75%">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">适用岗位</label>
                    <div class="flex flex-wrap gap-2">
                        <label class="inline-flex items-center space-x-2 px-3 py-1 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500" value="manager" checked>
                            <span class="text-sm text-gray-700">部门经理</span>
                        </label>
                        <label class="inline-flex items-center space-x-2 px-3 py-1 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500" value="specialist" checked>
                            <span class="text-sm text-gray-700">资产专员</span>
                        </label>
                        <label class="inline-flex items-center space-x-2 px-3 py-1 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500" value="clerk">
                            <span class="text-sm text-gray-700">资产管理员</span>
                        </label>
                        <label class="inline-flex items-center space-x-2 px-3 py-1 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                            <input type="checkbox" class="rounded text-blue-600 focus:ring-blue-500" value="all">
                            <span class="text-sm text-gray-700">全部岗位</span>
                        </label>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">历史记录</label>
                    <div class="bg-gray-50 rounded-lg p-3">
                        <div class="text-sm text-gray-600">
                            <div class="flex justify-between mb-2">
                                <span>创建时间：2026-01-15 10:30:00</span>
                                <span>创建人：张三</span>
                            </div>
                            <div class="flex justify-between">
                                <span>最后修改：2026-03-20 14:25:00</span>
                                <span>修改人：李四</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-8 flex justify-end space-x-3">
                    <button type="button" onclick="window.location.href='kpi_library.html'" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors">
                        取消
                    </button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                        保存修改
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('editKpiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const kpiData = {
                code: document.getElementById('kpiCode').value,
                name: document.getElementById('kpiName').value,
                category: document.getElementById('kpiCategory').value,
                type: document.getElementById('kpiType').value,
                formula: document.getElementById('kpiFormula').value,
                weight: document.getElementById('kpiWeight').value,
                dataSource: document.getElementById('dataSource').value,
                statCycle: document.getElementById('statCycle').value,
                targetValue: document.getElementById('targetValue').value,
                status: document.getElementById('kpiStatus').value,
                description: document.getElementById('kpiDescription').value,
                excellent: document.getElementById('excellent').value,
                good: document.getElementById('good').value,
                qualified: document.getElementById('qualified').value,
                unqualified: document.getElementById('unqualified').value
            };
            
            // 这里可以添加数据验证和提交逻辑
            console.log('编辑KPI指标:', kpiData);
            
            // 模拟成功提示
            alert('指标修改成功！');
            window.location.href = 'kpi_library.html';
        });
    </script>
</body>
</html>
