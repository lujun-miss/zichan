<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单位管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="modal.js"></script>
    <style>
        .unit-card {
            transition: all 0.3s ease;
        }
        .unit-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            background-color: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="p-6">
        <div class="mb-6 flex items-center justify-between">
            <p class="text-gray-600" id="page-description">管理各基层单位信息和资产情况</p>
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                    <i class="fa fa-user text-gray-600"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-800">管理员</p>
                    <p class="text-xs text-gray-500">admin@example.com</p>
                </div>
            </div>
        </div>

        

        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
                <div class="flex items-center">
                    <h3 class="text-lg font-semibold text-gray-800 mr-4">单位列表</h3>
                    <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium" id="unit-count">6个单位</span>
                </div>
                <button id="add-unit-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center">
                    <i class="fa fa-plus mr-2"></i>
                    添加单位
                </button>
            </div>
            
            <div class="mt-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa fa-search text-gray-400"></i>
                    </div>
                    <input type="text" id="unit-search" class="form-input pl-10" placeholder="搜索单位名称...">
                </div>
            </div>
        </div>

        <div id="unit-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 单位列表将通过JavaScript动态生成 -->
        </div>

        <div id="asset-list" class="hidden">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h3 class="text-xl font-semibold text-gray-800" id="unit-asset-title">单位资产列表</h3>
                        <p class="text-sm text-gray-600" id="unit-asset-count">共0项资产</p>
                    </div>
                    <div class="flex space-x-2">
                        <button id="add-asset-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center">
                            <i class="fa fa-plus mr-2"></i>
                            添加资产
                        </button>
                        <div class="relative">
                            <input type="text" placeholder="搜索资产名称..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
                        </div>
                        <select class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="">全部状态</option>
                            <option value="rented">已出租</option>
                            <option value="idle">闲置中</option>
                            <option value="maintenance">维修中</option>
                            <option value="used">自用</option>
                        </select>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">资产名称</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">资产类型</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">面积</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">出租属性</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">租金</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200" id="asset-table-body">
                            <!-- 资产列表将动态生成 -->
                        </tbody>
                    </table>
                </div>

                <div class="mt-6 flex items-center justify-between">
                    <div class="text-sm text-gray-600">
                        显示 <span class="font-medium">1</span> 到 <span class="font-medium">10</span> 条，共 <span class="font-medium">0</span> 条记录
                    </div>
                    <div class="flex items-center space-x-1">
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">
                            <i class="fa fa-chevron-left"></i>
                        </button>
                        <button class="px-3 py-1 bg-blue-600 text-white rounded-lg">1</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">2</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">3</button>
                        <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">
                            <i class="fa fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-6 flex items-center justify-center">
            <nav class="flex items-center space-x-1">
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-chevron-left"></i>
                </button>
                <button class="px-3 py-1 bg-blue-600 text-white rounded-lg">1</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">2</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">3</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">4</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">5</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-chevron-right"></i>
                </button>
            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取URL参数
            function getUrlParameter(name) {
                name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
                var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
                var results = regex.exec(location.search);
                return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
            }

            // 资产数据
            const assetsData = {
                '第一客运分公司': [
                    { name: '火车站东广场商铺', type: '房屋建筑', area: '120㎡', status: '已出租', rental: '出租', rent: '¥12,000/月' },
                    { name: '客运站办公楼', type: '房屋建筑', area: '850㎡', status: '闲置中', rental: '非出租', rent: '-' },
                    { name: '客运停车场', type: '土地', area: '2000㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '客运调度中心', type: '房屋建筑', area: '450㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '站前商铺', type: '房屋建筑', area: '80㎡', status: '已出租', rental: '出租', rent: '¥8,000/月' }
                ],
                '第二客运分公司': [
                    { name: '郊区客运站', type: '房屋建筑', area: '600㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '客运维修车间', type: '房屋建筑', area: '300㎡', status: '维修中', rental: '非出租', rent: '-' },
                    { name: '客运停车场', type: '土地', area: '1500㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '郊区客运站点', type: '房屋建筑', area: '120㎡', status: '闲置中', rental: '非出租', rent: '-' }
                ],
                '维修分公司': [
                    { name: '维修车间', type: '房屋建筑', area: '600㎡', status: '维修中', rental: '非出租', rent: '-' },
                    { name: '设备仓库', type: '房屋建筑', area: '400㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '维修停车场', type: '土地', area: '1200㎡', status: '自用', rental: '非出租', rent: '-' }
                ],
                '物流分公司': [
                    { name: '物流仓库', type: '房屋建筑', area: '1200㎡', status: '已出租', rental: '出租', rent: '¥60/㎡/月' },
                    { name: '物流配送中心', type: '房屋建筑', area: '800㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '物流停车场', type: '土地', area: '3000㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '物流办公区', type: '房屋建筑', area: '300㎡', status: '自用', rental: '非出租', rent: '-' }
                ],
                '公交分公司': [
                    { name: '公交枢纽站商铺', type: '房屋建筑', area: '80㎡', status: '已出租', rental: '出租', rent: '¥15,000/月' },
                    { name: '公交调度中心', type: '房屋建筑', area: '500㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '公交停车场', type: '土地', area: '2500㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '公交维修站', type: '房屋建筑', area: '400㎡', status: '维修中', rental: '非出租', rent: '-' }
                ],
                '高铁分公司': [
                    { name: '高铁站配套用房', type: '房屋建筑', area: '450㎡', status: '闲置中', rental: '非出租', rent: '-' },
                    { name: '高铁站商铺', type: '房屋建筑', area: '150㎡', status: '已出租', rental: '出租', rent: '¥20,000/月' },
                    { name: '高铁停车场', type: '土地', area: '1800㎡', status: '自用', rental: '非出租', rent: '-' },
                    { name: '高铁办公区', type: '房屋建筑', area: '600㎡', status: '自用', rental: '非出租', rent: '-' }
                ]
            };

            // 检查是否有单位参数
            const unitName = getUrlParameter('unit');
            if (unitName) {
                // 显示资产列表，隐藏单位管理相关内容
                document.getElementById('unit-list').classList.add('hidden');
                document.getElementById('asset-list').classList.remove('hidden');
                
                // 更新描述并隐藏单位管理区域
                document.getElementById('page-description').textContent = `${unitName}的资产明细`;
                document.getElementById('unit-asset-title').textContent = `${unitName}资产列表`;
                
                // 隐藏单位管理相关的搜索和添加按钮区域
                const unitSearchArea = document.querySelector('.bg-white.rounded-xl.shadow-sm.p-6.mb-6');
                if (unitSearchArea) {
                    unitSearchArea.classList.add('hidden');
                }
                
                // 隐藏页面标题和描述区域（顶部红框内容）
                const pageHeader = document.querySelector('.mb-6');
                if (pageHeader) {
                    pageHeader.classList.add('hidden');
                }
                
                // 隐藏底部分页控件（底部红框内容）
                const paginationArea = document.querySelector('.mt-6.flex.items-center.justify-center');
                if (paginationArea) {
                    paginationArea.classList.add('hidden');
                }
                
                // 获取该单位的资产数据
                const assets = assetsData[unitName] || [];
                document.getElementById('unit-asset-count').textContent = `共${assets.length}项资产`;
                
                // 生成资产表格
                const tableBody = document.getElementById('asset-table-body');
                tableBody.innerHTML = '';
                
                assets.forEach((asset, index) => {
                    const row = document.createElement('tr');
                    
                    // 根据状态设置不同的样式
                    let statusClass = '';
                    switch(asset.status) {
                        case '已出租':
                            statusClass = 'bg-green-100 text-green-800';
                            break;
                        case '闲置中':
                            statusClass = 'bg-yellow-100 text-yellow-800';
                            break;
                        case '维修中':
                            statusClass = 'bg-red-100 text-red-800';
                            break;
                        case '自用':
                            statusClass = 'bg-blue-100 text-blue-800';
                            break;
                    }
                    
                    // 根据出租属性设置样式
                    let rentalClass = asset.rental === '出租' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
                    
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">${asset.name}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-500">${asset.type}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-500">${asset.area}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${rentalClass}">
                                ${asset.rental}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${statusClass}">
                                ${asset.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            ${asset.rent}
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
                            <button class="text-blue-600 hover:text-blue-900 mr-3">详情</button>
                            <button class="text-blue-600 hover:text-blue-900">编辑</button>
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                });
            }

            

            // 添加资产按钮点击事件
            document.getElementById('add-asset-btn').addEventListener('click', function() {
                const addAssetForm = `
                    <form id="add-asset-form">
                        <div class="form-group">
                            <label class="form-label" for="asset-name">资产名称 <span class="text-red-500">*</span></label>
                            <input type="text" id="asset-name" class="form-input" placeholder="请输入资产名称" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="asset-type">资产类型 <span class="text-red-500">*</span></label>
                            <select id="asset-type" class="form-select" required>
                                <option value="">请选择资产类型</option>
                                <option value="房屋建筑">房屋建筑</option>
                                <option value="土地">土地</option>
                                <option value="设备">设备</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="asset-area">面积</label>
                            <input type="text" id="asset-area" class="form-input" placeholder="请输入面积（如：120㎡）">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="asset-rental">出租属性 <span class="text-red-500">*</span></label>
                            <select id="asset-rental" class="form-select" required>
                                <option value="">请选择出租属性</option>
                                <option value="出租">出租</option>
                                <option value="非出租">非出租</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="asset-status">资产状态 <span class="text-red-500">*</span></label>
                            <select id="asset-status" class="form-select" required>
                                <option value="">请选择资产状态</option>
                                <option value="已出租">已出租</option>
                                <option value="闲置中">闲置中</option>
                                <option value="维修中">维修中</option>
                                <option value="自用">自用</option>
                            </select>
                        </div>
                        <div class="form-group" id="rent-fields" style="display: none;">
                            <label class="form-label" for="asset-rent-period">支付周期</label>
                            <select id="asset-rent-period" class="form-select">
                                <option value="month">月付</option>
                                <option value="quarter">季付</option>
                                <option value="year">年付</option>
                            </select>
                        </div>
                        <div class="form-group" id="rent-amount-field" style="display: none;">
                            <label class="form-label" for="asset-rent">租金金额</label>
                            <input type="text" id="asset-rent" class="form-input" placeholder="请输入租金金额（如：12000）">
                        </div>
                    </form>
                `;

                showModal({
                    title: '添加资产',
                    content: addAssetForm,
                    onConfirm: function() {
                        const form = document.getElementById('add-asset-form');
                        if (form.checkValidity()) {
                            const assetName = document.getElementById('asset-name').value;
                            const assetType = document.getElementById('asset-type').value;
                            const assetArea = document.getElementById('asset-area').value;
                            const assetRental = document.getElementById('asset-rental').value;
                            const assetStatus = document.getElementById('asset-status').value;
                            const assetRentPeriod = document.getElementById('asset-rent-period').value;
                            const assetRentAmount = document.getElementById('asset-rent').value || '-';
                            
                            let rentDisplay = '-';
                            if (assetRental === '出租' && assetRentAmount !== '-') {
                                const periodMap = {
                                    'month': '月',
                                    'quarter': '季',
                                    'year': '年'
                                };
                                rentDisplay = `¥${assetRentAmount}/${periodMap[assetRentPeriod]}`;
                            }
                            
                            // 模拟添加资产操作
                            console.log('添加资产:', {
                                name: assetName,
                                type: assetType,
                                area: assetArea,
                                rental: assetRental,
                                status: assetStatus,
                                rentPeriod: assetRentPeriod,
                                rentAmount: assetRentAmount
                            });
                            
                            // 显示成功提示
                            showModal({
                                title: '添加成功',
                                content: `
                                    <div class="space-y-4">
                                        <p class="text-green-600">资产 "${assetName}" 添加成功！</p>
                                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                            <h5 class="font-semibold text-blue-800 mb-2">资产信息</h5>
                                            <p class="text-sm text-blue-700">类型：<strong>${assetType}</strong></p>
                                            <p class="text-sm text-blue-700">出租属性：<strong>${assetRental}</strong></p>
                                            <p class="text-sm text-blue-700">状态：<strong>${assetStatus}</strong></p>
                                            ${assetArea ? `<p class="text-sm text-blue-700">面积：<strong>${assetArea}</strong></p>` : ''}
                                            ${rentDisplay !== '-' ? `<p class="text-sm text-blue-700">租金：<strong>${rentDisplay}</strong></p>` : ''}
                                        </div>
                                    </div>
                                `,
                                showCancelButton: false,
                                confirmButtonText: '确定'
                            });
                        } else {
                            // 表单验证失败
                            form.reportValidity();
                        }
                    },
                    onModalShow: function() {
                        // 添加事件监听器来控制租金字段的显示/隐藏
                        const rentalSelect = document.getElementById('asset-rental');
                        const statusSelect = document.getElementById('asset-status');
                        const rentFields = document.getElementById('rent-fields');
                        const rentAmountField = document.getElementById('rent-amount-field');
                        
                        function updateRentFieldsVisibility() {
                            const isRental = rentalSelect.value === '出租';
                            
                            if (isRental) {
                                rentFields.style.display = 'block';
                                rentAmountField.style.display = 'block';
                            } else {
                                rentFields.style.display = 'none';
                                rentAmountField.style.display = 'none';
                            }
                        }
                        
                        // 初始检查
                        updateRentFieldsVisibility();
                        
                        // 添加事件监听器
                        rentalSelect.addEventListener('change', updateRentFieldsVisibility);
                        statusSelect.addEventListener('change', updateRentFieldsVisibility);
                    }
                });
            });

            // 添加单位按钮点击事件
            document.getElementById('add-unit-btn').addEventListener('click', function() {
                const addUnitForm = `
                    <form id="add-unit-form">
