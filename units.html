<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单位管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="modal.js"></script>
    <style>
        .unit-card {
            transition: all 0.3s ease;
        }
        .unit-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            background-color: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="p-6">
        <div class="mb-6 flex items-center justify-between">
            <p class="text-gray-600" id="page-description">管理各基层单位信息和资产情况</p>
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                    <i class="fa fa-user text-gray-600"></i>
                </div>
                <div>
                    <p class="text-sm font-medium text-gray-800">管理员</p>
                    <p class="text-xs text-gray-500">admin@example.com</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
                <div class="flex items-center">
                    <h3 class="text-lg font-semibold text-gray-800 mr-4">单位列表</h3>
                    <span class="px-2 py-1 bg-blue-100 text-blue-800 rounded-full text-sm font-medium" id="unit-count">6个单位</span>
                </div>
                <button id="add-unit-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center">
                    <i class="fa fa-plus mr-2"></i>
                    添加单位
                </button>
            </div>
            
            <div class="mt-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa fa-search text-gray-400"></i>
                    </div>
                    <input type="text" id="unit-search" class="form-input pl-10" placeholder="搜索单位名称...">
                </div>
            </div>
        </div>

        <div id="unit-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 单位列表将通过JavaScript动态生成 -->
        </div>

        <div class="mt-6 flex items-center justify-center">
            <nav class="flex items-center space-x-1">
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-chevron-left"></i>
                </button>
                <button class="px-3 py-1 bg-blue-600 text-white rounded-lg">1</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">2</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">3</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">4</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">5</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-chevron-right"></i>
                </button>
            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            // 添加单位按钮点击事件
            document.getElementById('add-unit-btn').addEventListener('click', function() {
                const addUnitForm = `
                    <form id="add-unit-form">
                        <div class="form-group">
                            <label class="form-label" for="unit-name">单位名称 <span class="text-red-500">*</span></label>
                            <input type="text" id="unit-name" class="form-input" placeholder="请输入单位名称" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="unit-type">单位类型 <span class="text-red-500">*</span></label>
                            <select id="unit-type" class="form-select" required>
                                <option value="">请选择单位类型</option>
                                <option value="客运公司">客运公司</option>
                                <option value="维修公司">维修公司</option>
                                <option value="物流公司">物流公司</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="unit-manager">负责人 <span class="text-red-500">*</span></label>
                            <input type="text" id="unit-manager" class="form-input" placeholder="请输入负责人姓名" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="unit-phone">联系电话 <span class="text-red-500">*</span></label>
                            <input type="tel" id="unit-phone" class="form-input" placeholder="请输入联系电话" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="unit-address">单位地址</label>
                            <input type="text" id="unit-address" class="form-input" placeholder="请输入单位地址">
                        </div>

                        <div class="border-t border-gray-200 pt-4 mt-4">
                            <h4 class="font-semibold text-gray-700 mb-3">创建单位管理员账号</h4>
                            <div class="form-group">
                                <label class="form-label" for="admin-username">账号 <span class="text-red-500">*</span></label>
                                <input type="text" id="admin-username" class="form-input" placeholder="请输入管理员账号" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="admin-password">初始密码 <span class="text-red-500">*</span></label>
                                <input type="password" id="admin-password" class="form-input" placeholder="请设置初始密码" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="admin-email">邮箱</label>
                                <input type="email" id="admin-email" class="form-input" placeholder="请输入邮箱地址">
                            </div>
                        </div>
                    </form>
                `;

                showModal({
                    title: '添加单位',
                    content: addUnitForm,
                    onConfirm: function() {
                        const form = document.getElementById('add-unit-form');
                        if (form.checkValidity()) {
                            const unitName = document.getElementById('unit-name').value;
                            const unitType = document.getElementById('unit-type').value;
                            const unitManager = document.getElementById('unit-manager').value;
                            const adminUsername = document.getElementById('admin-username').value;
                            const adminPassword = document.getElementById('admin-password').value;
                            
                            // 模拟添加单位操作
                            console.log('添加单位:', {
                                name: unitName,
                                type: unitType,
                                manager: unitManager
                            });
                            
                            // 模拟创建管理员账号操作
                            console.log('创建管理员账号:', {
                                unit: unitName,
                                username: adminUsername,
                                role: 'admin'
                            });
                            
                            // 显示成功提示
                            showModal({
                                title: '添加成功',
                                content: `
                                    <div class="space-y-4">
                                        <p class="text-green-600">单位 "${unitName}" 添加成功！</p>
                                        <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                            <h5 class="font-semibold text-blue-800 mb-2">管理员账号信息</h5>
                                            <p class="text-sm text-blue-700">账号：<strong>${adminUsername}</strong></p>
                                            <p class="text-sm text-blue-700">初始密码：<strong>${adminPassword}</strong></p>
                                            <p class="text-xs text-blue-600 mt-2">请妥善保存初始密码，首次登录需修改密码</p>
                                        </div>
                                    </div>
                                `,
                                showCancelButton: false,
                                confirmButtonText: '确定'
                            });
                        } else {
                            // 表单验证失败
                            form.reportValidity();
                        }
                    }
                });
            });

            // 搜索功能
            const unitsData = [
                {
                    name: '第一客运分公司',
                    type: '客运公司',
                    assetCount: 342,
                    rentalRate: '82.5%',
                    idleAssets: 58,
                    manager: '张三'
                },
                {
                    name: '第二客运分公司',
                    type: '客运公司',
                    assetCount: 276,
                    rentalRate: '78.3%',
                    idleAssets: 61,
                    manager: '李四'
                },
                {
                    name: '第三客运分公司',
                    type: '客运公司',
                    assetCount: 245,
                    rentalRate: '75.2%',
                    idleAssets: 61,
                    manager: '王五'
                },
                {
                    name: '物流分公司',
                    type: '物流公司',
                    assetCount: 218,
                    rentalRate: '85.2%',
                    idleAssets: 32,
                    manager: '赵六'
                },
                {
                    name: '公交分公司',
                    type: '客运公司',
                    assetCount: 187,
                    rentalRate: '72.1%',
                    idleAssets: 52,
                    manager: '孙七'
                },
                {
                    name: '高铁分公司',
                    type: '客运公司',
                    assetCount: 159,
                    rentalRate: '79.3%',
                    idleAssets: 33,
                    manager: '周八'
                }
            ];

            function renderUnits(units) {
                const unitList = document.getElementById('unit-list');
                unitList.innerHTML = '';
                
                units.forEach((unit, index) => {
                    const unitCard = document.createElement('div');
                    unitCard.className = 'unit-card bg-white rounded-xl shadow-sm overflow-hidden';
                    unitCard.innerHTML = `
                        <div class="p-6">
                            <div class="flex items-center mb-4">
                                <div class="flex items-center space-x-3">
                                    <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                                        <i class="fa fa-building text-blue-600 text-xl"></i>
                                    </div>
                                    <div>
                                        <h3 class="font-semibold text-gray-800">${unit.name}</h3>
                                        <p class="text-sm text-gray-500">${unit.type}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="space-y-3">
                                <div class="flex items-center justify-between">
                                    <span class="text-sm text-gray-600">总资产数量</span>
                                    <span class="font-medium text-gray-800">${unit.assetCount}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center">
                                        <span class="text-sm text-gray-600">出租率</span>
                                        <span class="ml-1 text-blue-600 hover:text-blue-800 cursor-pointer" id="unit-rental-rate-help">
                                            <i class="fa fa-question-circle"></i>
                                        </span>
                                    </div>
                                    <span class="font-medium text-green-600">${unit.rentalRate}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-sm text-gray-600">闲置资产</span>
                                    <span class="font-medium text-yellow-600">${unit.idleAssets}</span>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-sm text-gray-600">负责人</span>
                                    <span class="font-medium text-gray-800">${unit.manager}</span>
                                </div>
                            </div>
                            <div class="mt-4 pt-4 border-t border-gray-100">
                                <button class="view-detail-btn w-full px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition-colors flex items-center justify-center" data-index="${index}">
                                    <i class="fa fa-eye mr-2"></i>
                                    查看详情
                                </button>
                            </div>
                        </div>
                    `;
                    unitList.appendChild(unitCard);
                });
                
                // 更新单位数量
                document.getElementById('unit-count').textContent = `${units.length}个单位`;
                
                // 重新绑定查看详情按钮事件
                document.querySelectorAll('.view-detail-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        const unit = unitsData[index];
                        window.location.href = 'unit_assets.html?unit=' + encodeURIComponent(unit.name);
                    });
                });
            }

            // 搜索输入事件
            document.getElementById('unit-search').addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase().trim();
                
                if (searchTerm === '') {
                    renderUnits(unitsData);
                } else {
                    const filteredUnits = unitsData.filter(unit => 
                        unit.name.toLowerCase().includes(searchTerm)
                    );
                    renderUnits(filteredUnits);
                }
            });

            // 初始化渲染
            renderUnits(unitsData);

            // 单位出租率帮助信息点击事件（委托事件，因为元素是动态生成的）
            document.addEventListener('click', function(e) {
                if (e.target.closest('#unit-rental-rate-help')) {
                    showModal({
                        title: '出租率说明',
                        content: `
                            <div class="space-y-4">
                                <div class="bg-blue-50 border-l-4 border-blue-500 p-4">
                                    <h4 class="font-semibold text-blue-800 mb-2">出租率定义</h4>
                                    <p class="text-sm text-blue-700">出租率 = 已出租资产数量 ÷ 总资产数量 × 100%</p>
                                </div>
                                
                                <div class="space-y-2">
                                    <p class="text-sm font-medium text-gray-800">说明：</p>
                                    <ul class="list-disc list-inside text-sm text-gray-600 space-y-2">
                                        <li>已出租资产：状态为"已出租"的资产</li>
                                        <li>总资产数量：该单位所有具有"出租"属性的资产总数</li>
                                        <li>出租率反映单位资产利用效率，越高越好</li>
                                        <li>此数据为实时统计，反映当前最新状态</li>
                                    </ul>
                                </div>
                            </div>
                        `,
                        showCancelButton: false,
                        confirmButtonText: '我知道了'
                    });
                }
            });

        });
    </script>
</body>
</html>
