<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单位管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="modal.js"></script>
    <style>
        .unit-card {
            transition: all 0.3s ease;
        }
        .unit-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            background-color: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

                </div>

                </button>
            </div>

                        <i class="fa fa-search text-gray-400"></i>
                    </div>
                    <input type="text" id="unit-search" class="form-input pl-10" placeholder="搜索单位名称...">
                </div>
            </div>
        </div>

        <div id="unit-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 单位列表将通过JavaScript动态生成 -->
        </div>

                        <button id="add-asset-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center justify-center">

                <div class="overflow-x-auto">

                        <thead class="bg-gray-50">

                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">租金</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">租赁时间</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                            </tr>

                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">5</button>
                <button class="px-3 py-1 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50">
                    <i class="fa fa-chevron-right"></i>
                </button>
            </nav>
        </div>
    </div>

            // 检查是否有单位参数
            const unitName = getUrlParameter('unit');
            if (unitName) {
                // 显示资产列表，隐藏单位管理相关内容
                document.getElementById('unit-list').classList.add('hidden');
                document.getElementById('asset-list').classList.remove('hidden');

                document.getElementById('unit-asset-title').textContent = `${unitName}资产列表`;

                const unitSearchArea = document.querySelector('.bg-white.rounded-xl.shadow-sm.p-6.mb-6');
                if (unitSearchArea) {
                    unitSearchArea.classList.add('hidden');
                }
                
                // 隐藏页面标题和描述区域（顶部红框内容）
                const pageHeader = document.querySelector('.mb-6');
                if (pageHeader) {
                    pageHeader.classList.add('hidden');
                }
                
                // 隐藏底部分页控件（底部红框内容）
                const paginationArea = document.querySelector('.mt-6.flex.items-center.justify-center');
                if (paginationArea) {
                    paginationArea.classList.add('hidden');
                }
                
                // 获取该单位的资产数据
                const assets = assetsData[unitName] || [];
                document.getElementById('unit-asset-count').textContent = `共${assets.length}项资产`;
                
                // 计算统计数据
                let expiringCount = 0;
                let unprocessedCount = 0;
                
                assets.forEach(asset => {
                    if (asset.rental === '出租') {
                        // 检查是否即将到期（30天内）
                        if (asset.rentalEnd) {
                            const today = new Date();
                            const expiryDate = new Date(asset.rentalEnd);
                            const diffTime = expiryDate - today;
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            if (diffDays >= 0 && diffDays <= 30) {
                                expiringCount++;
                                // 检查是否已处理
                                if (!(asset.assessment && asset.assessment.status === '已处理（不续签）')) {
                                    unprocessedCount++;
                                }
                            }
                        }
                    }
                });
                
                // 更新统计信息
                const expiringCountElement = document.getElementById('expiring-count');
                const unprocessedCountElement = document.getElementById('unprocessed-count');
                expiringCountElement.textContent = expiringCount;
                unprocessedCountElement.textContent = unprocessedCount;
                
                // 添加点击事件
                expiringCountElement.onclick = function() {
                    filterAssets('expiring');
                };
                
                unprocessedCountElement.onclick = function() {
                    filterAssets('unprocessed');
                };
                
                // 生成资产表格
                const tableBody = document.getElementById('asset-table-body');
                tableBody.innerHTML = '';
                
                assets.forEach((asset, index) => {
                    const row = document.createElement('tr');
                    
                    // 根据状态设置不同的样式
                    let statusClass = '';
                    switch(asset.status) {
                        case '已出租':
                            statusClass = 'bg-green-100 text-green-800';
                            break;
                        case '闲置中':
                            statusClass = 'bg-yellow-100 text-yellow-800';
                            break;
                        case '维修中':
                            statusClass = 'bg-red-100 text-red-800';
                            break;
                        case '自用':
                            statusClass = 'bg-blue-100 text-blue-800';
                            break;
                    }
                    
                    // 根据出租属性设置样式
                    let rentalClass = asset.rental === '出租' ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
                    
                    // 检查是否即将到期（30天内）
                    function isNearExpiry(endDate) {
                        if (!endDate) return false;
                        const today = new Date();
                        const expiryDate = new Date(endDate);
                        const diffTime = expiryDate - today;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        return diffDays >= 0 && diffDays <= 30;
                    }
                    
                    const isExpiring = asset.rental === '出租' && isNearExpiry(asset.rentalEnd);
                    const expiryBadge = isExpiring ? `<span class="ml-2 px-2 py-0.5 bg-red-100 text-red-800 rounded-full text-xs">即将到期</span>` : '';

                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-500">${asset.type}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">

                            const today = new Date();
                            const expiryDate = new Date(asset.rentalEnd);
                            const diffTime = expiryDate - today;
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            shouldDisplay = diffDays >= 0 && diffDays <= 30;
                        }

                        // 筛选未处理的即将到期资产
                        if (asset.rental === '出租' && asset.rentalEnd) {
                            const today = new Date();
                            const expiryDate = new Date(asset.rentalEnd);
                            const diffTime = expiryDate - today;
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            const isExpiring = diffDays >= 0 && diffDays <= 30;
                            const isUnprocessed = !(asset.assessment && asset.assessment.status === '已处理（不续签）');

            // 隐藏续签表单
            window.hideRenewalForm = function(index) {
                const modalOverlay = document.getElementById('modal-overlay');
                if (modalOverlay) {
                    modalOverlay.remove();
                }
            };
            
            // 提交续签表单
            window.submitRenewal = function(index) {
                const unitName = getUrlParameter('unit');
                const assets = assetsData[unitName] || [];
                const asset = assets[index];
                
                if (!asset) return;
                
                const fileInput = document.getElementById(`renewal-contract-file-${index}`);
                const photoInput = document.getElementById(`renewal-photo-file-${index}`);
                const startDate = document.getElementById(`renewal-start-date-${index}`).value;
                const endDate = document.getElementById(`renewal-end-date-${index}`).value;
                const rent = document.getElementById(`renewal-rent-${index}`).value;
                const note = document.getElementById(`renewal-note-${index}`).value;
                
                // 不再验证表单，直接提交
                
                const currentTime = new Date().toLocaleString();
                
                // 更新资产信息
                asset.rentalStart = startDate;
                asset.rentalEnd = endDate;
                asset.rent = rent ? `¥${parseInt(rent).toLocaleString()}/月` : asset.rent;
                asset.contract = fileInput.files[0].name;
                
                // 更新照片（如果有上传）
                if (photoInput.files && photoInput.files.length > 0) {
                    asset.photos = asset.photos || [];
                    for (let i = 0; i< photoInput.files.length; i++) {
                        asset.photos.push(photoInput.files[i].name);
                    }
                }
                
                // 记录操作日志
                asset.operationLogs = asset.operationLogs || [];
                asset.operationLogs.unshift({
                    action: '续签合同',
                    user: '管理员',
                    time: currentTime,
                    type: '更新',
                    description: `续签租赁合同，新租期：${startDate} 至 ${endDate}${note ? '，备注：' + note : ''}`
                });
                
                // 关闭更改状态弹窗
                const modalOverlay = document.getElementById('modal-overlay');
                if (modalOverlay) {
                    modalOverlay.remove();
                }
            };
            
            // 从列表直接续签
            window.handleRenewalFromList = function(index) {
                const unitName = getUrlParameter('unit');
                const assets = assetsData[unitName] || [];
                const asset = assets[index];
                
                if (!asset) return;
                
                // 直接显示续签表单弹窗
                showModal({
                    title: '续签合同',
                    content: `
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <p class="text-sm text-gray-500 mb-1">资产名称</p>
                                    <p class="font-medium text-gray-800">${asset.name}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1">当前状态</p>
                                    <p class="font-medium ${asset.status === '已出租' ? 'text-green-600' : 
                                        asset.status === '闲置中' ? 'text-yellow-600' : 
                                        asset.status === '自用' ? 'text-blue-600' : 'text-gray-800'}">${asset.status}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1">出租属性</p>
                                    <p class="font-medium ${asset.rental === '出租' ? 'text-green-600' : 'text-gray-600'}">${asset.rental}</p>
                                </div>
                                <div>
                                    <p class="text-sm text-gray-500 mb-1">租金</p>
                                    <p class="font-medium text-gray-800">${asset.rent}</p>
                                </div>
                            </div>
                            
                            <div class="border-t border-gray-200 pt-4">
                                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                                    <h5 class="font-semibold text-blue-800 mb-2">续签说明</h5>
                                    <ul class="list-disc list-inside text-sm text-blue-700 space-y-1">
                                        <li>请上传新的租赁合同文件</li>
                                        <li>设置新的租赁期限</li>
                                        <li>提交后系统将更新资产状态</li>
                                    </ul>
                                </div>
                                
                                <div class="space-y-4 mt-4">
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">上传新合同</label>
                                        <input type="file" id="renewal-contract-file-${index}" accept=".pdf,.doc,.docx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                                        <p class="mt-1 text-xs text-gray-500">支持PDF、Word格式文件</p>
                                    </div>
                                    
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">上传实物照片</label>
                                        <input type="file" id="renewal-photo-file-${index}" accept="image/*" multiple class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                                        <p class="mt-1 text-xs text-gray-500">支持JPG、PNG等图片格式，可多选</p>
                                    </div>
                                    
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">新租期开始日期</label>
                                            <input type="date" id="renewal-start-date-${index}" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" value="${asset.rentalEnd}">
                                        </div>
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">新租期结束日期</label>
                                            <input type="date" id="renewal-end-date-${index}" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">租金金额</label>
                                        <div class="relative">
                                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">¥</span>
                                            <input type="number" id="renewal-rent-${index}" class="block w-full pl-8 rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" placeholder="请输入租金金额" value="${asset.rent.replace(/[^\d]/g, '')}">
                                            <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500">/月</span>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label class="block text-sm font-medium text-gray-700 mb-2">备注</label>
                                        <textarea id="renewal-note-${index}" rows="3" class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500" placeholder="请输入续签备注信息"></textarea>
                                    </div>
                                    
                                    <div class="flex space-x-3">
                                        <button class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors" onclick="submitRenewal(${index})">提交续签</button>
                                        <button class="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors" onclick="hideRenewalForm(${index})">取消</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `,
                    showCancelButton: false,
                    showConfirmButton: false
                });
            };
            
            // 从列表直接不续签
            window.handleNotRenewFromList = function(index) {
                handleNotRenew(index);
            };
            
            // 处理不续签操作
            window.handleNotRenew = function(index) {
                const unitName = getUrlParameter('unit');
                const assets = assetsData[unitName] || [];
                const asset = assets[index];
                
                if (!asset) return;
                
                // 显示确认弹窗
                showModal({
                    title: '确认不续签',
                    content: `
                        <div class="space-y-4">
                            <p class="text-gray-600">您确定要标记资产 "<strong>${asset.name}</strong>" 为不续签吗？</p>
                            <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4">
                                <h5 class="font-semibold text-yellow-800 mb-2">操作说明</h5>
                                <ul class="list-disc list-inside text-sm text-yellow-700 space-y-1">
                                    <li>点击确认后，系统将记录操作时间</li>
                                    <li>合同到期后，资产状态将自动变更为"闲置中"</li>
                                </ul>
                            </div>
                        </div>
                    `,
                    confirmButtonText: '确认不续签',
                    cancelButtonText: '取消',
                    onConfirm: function() {
                        const currentTime = new Date().toLocaleString();
                        
                        // 更新资产状态为已处理（不续签）
                        asset.assessment = asset.assessment || {};
                        asset.assessment.status = '已处理（不续签）';
                        asset.assessment.overdueDays = 0;
                        asset.assessment.penaltyPoints = 0;
                        
                        // 记录操作日志
                        asset.operationLogs = asset.operationLogs || [];
                        asset.operationLogs.unshift({
                            action: '标记不续签',
                            user: '管理员',
                            time: currentTime,
                            type: '更新',
                            description: `标记资产为不续签，合同到期日：${asset.rentalEnd}`
                        });
                    }
                });
            };

            // 单位出租率帮助信息点击事件（委托事件，因为元素是动态生成的）
            document.addEventListener('click', function(e) {
                if (e.target.closest('#unit-rental-rate-help')) {
                    showModal({
                        title: '出租率说明',
                        content: `
                            <div class="space-y-4">
                                <div class="bg-blue-50 border-l-4 border-blue-500 p-4">
                                    <h4 class="font-semibold text-blue-800 mb-2">出租率定义</h4>
                                    <p class="text-sm text-blue-700">出租率 = 已出租资产数量 ÷ 总资产数量 × 100%</p>
                                </div>
                                
                                <div class="space-y-2">
                                    <p class="text-sm font-medium text-gray-800">说明：</p>
                                    <ul class="list-disc list-inside text-sm text-gray-600 space-y-2">
                                        <li>已出租资产：状态为"已出租"的资产</li>
                                        <li>总资产数量：该单位所有具有"出租"属性的资产总数</li>
                                        <li>出租率反映单位资产利用效率，越高越好</li>
                                        <li>此数据为实时统计，反映当前最新状态</li>
                                    </ul>
                                </div>
                            </div>
                        `,
                        showCancelButton: false,
                        confirmButtonText: '我知道了'
                    });
                }
            });

        });
    </script>
</body>
</html>
